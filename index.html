<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
</head>
<body>

<h2>My Notes</h2>

<!-- ADD NOTE -->
<form action="/add" method="post">
    <input type="text" name="note" placeholder="Enter note" required>
    <button type="submit">Add</button>
</form>

<hr>

<!-- SHOW NOTES -->
<ul>
    {% for note in notes %}
        <li>
            {{ note.text }}

            <!-- DELETE BUTTON -->
            <form action="/delete/{{ note.id }}" method="post" style="display:inline;">
                <button type="submit">Delete</button>
            </form>

        </li>
    {% endfor %}
</ul>

</body>
</html>
